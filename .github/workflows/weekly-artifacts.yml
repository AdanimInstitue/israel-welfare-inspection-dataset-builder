name: Weekly review artifacts

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without production LLM provider calls"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_pages:
        description: "Maximum Gov.il collector pages to inspect"
        required: true
        default: "1"

permissions:
  contents: read
  actions: read

concurrency:
  group: weekly-review-artifacts
  cancel-in-progress: false

jobs:
  weekly-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Plan weekly run
        env:
          DISPATCH_DRY_RUN: ${{ github.event.inputs.dry_run }}
          DISPATCH_MAX_PAGES: ${{ github.event.inputs.max_pages }}
          WELFARE_INSPECTIONS_LLM_PROVIDER: ${{ secrets.WELFARE_INSPECTIONS_LLM_PROVIDER }}
          WELFARE_INSPECTIONS_LLM_MODEL: ${{ secrets.WELFARE_INSPECTIONS_LLM_MODEL }}
          WELFARE_INSPECTIONS_LLM_MODEL_VERSION: ${{ secrets.WELFARE_INSPECTIONS_LLM_MODEL_VERSION }}
        run: |
          set -euo pipefail
          DRY_RUN="${DISPATCH_DRY_RUN:-true}"
          MAX_PAGES="${DISPATCH_MAX_PAGES:-1}"
          MODE="dry-run"
          if [ "${DRY_RUN}" = "false" ]; then
            MODE="production"
          fi
          python -m welfare_inspections.cli weekly-plan \
            --output-dir outputs/weekly \
            --artifact-dir outputs/weekly/review_artifacts \
            --mode "${MODE}" \
            --max-pages "${MAX_PAGES}" \
            --request-delay-seconds 2

      - name: Execute planned stages
        env:
          WELFARE_INSPECTIONS_LLM_PROVIDER: ${{ secrets.WELFARE_INSPECTIONS_LLM_PROVIDER }}
          WELFARE_INSPECTIONS_LLM_MODEL: ${{ secrets.WELFARE_INSPECTIONS_LLM_MODEL }}
          WELFARE_INSPECTIONS_LLM_MODEL_VERSION: ${{ secrets.WELFARE_INSPECTIONS_LLM_MODEL_VERSION }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          plan = json.loads(Path("outputs/weekly/weekly_run_plan.json").read_text())
          for command_plan in plan["commands"]:
              stage = command_plan["stage"]
              command = command_plan["command"]
              print(f"::group::{stage}")
              try:
                  subprocess.run(command, check=True)
              finally:
                  print("::endgroup::")
          PY

      - name: Upload weekly review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-review-artifacts
          path: |
            outputs/weekly/**/*.json
            outputs/weekly/**/*.jsonl
            outputs/weekly/exports/*.csv
          if-no-files-found: ignore
          retention-days: 14
