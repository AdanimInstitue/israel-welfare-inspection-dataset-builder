name: Weekly review artifacts

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Maximum Gov.il collector pages to inspect"
        required: true
        default: "1"

permissions:
  contents: read
  actions: read

concurrency:
  group: weekly-review-artifacts
  cancel-in-progress: false

jobs:
  weekly-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Plan weekly run
        env:
          DISPATCH_MAX_PAGES: ${{ github.event.inputs.max_pages }}
        run: |
          set -euo pipefail
          MAX_PAGES="${DISPATCH_MAX_PAGES:-1}"
          python -m welfare_inspections.cli weekly-plan \
            --output-dir outputs/weekly \
            --artifact-dir outputs/weekly/review_artifacts \
            --mode dry-run \
            --max-pages "${MAX_PAGES}" \
            --request-delay-seconds 2

      - name: Execute planned stages
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          plan = json.loads(Path("outputs/weekly/weekly_run_plan.json").read_text())
          for command_plan in plan["commands"]:
              stage = command_plan["stage"]
              command = command_plan["command"]
              print(f"::group::{stage}")
              try:
                  subprocess.run(command, check=True)
              finally:
                  print("::endgroup::")
          PY

      - name: Upload weekly review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-review-artifacts
          path: |
            outputs/weekly/weekly_run_plan.json
            outputs/weekly/weekly_run_summary.json
            outputs/weekly/weekly_artifact_manifest.json
            outputs/weekly/discovery_diagnostics.json
            outputs/weekly/download_manifest.jsonl
            outputs/weekly/download_diagnostics.json
            outputs/weekly/text_extraction_diagnostics.json
            outputs/weekly/metadata_parse_diagnostics.json
            outputs/weekly/rendered_pages_manifest.jsonl
            outputs/weekly/page_render_diagnostics.json
            outputs/weekly/llm_extraction_diagnostics.json
            outputs/weekly/llm_eval_report.json
            outputs/weekly/reconciliation_diagnostics.json
            outputs/weekly/backfill_diagnostics.json
          if-no-files-found: ignore
          retention-days: 14
